<!DOCTYPE html>
<html lang = eng>
    <head>
        <script>
            let counter = 0;
            function hello(){
                counter++
                document.querySelector('h1').innerHTML = 'You said hello ' + counter + ' times still';
            }
        </script>
    </head>
    <body>
        <h1>You haven't said hello</h1>
        <button onclick = "hello()">Say Hello</button>
    </body>
</html>
